<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact Us | AgroSmart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#f0f8f5;
 --text:#0f2d1c;
 --muted:#4b5a4d;
 --card:#e6f2ea;
 --accent:#2e7d32;
 --radius:22px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
background:var(--bg);
color:var(--text);
}

/* NAV */
nav{
position:sticky;
top:0;
background:rgba(240,248,245,.92);
backdrop-filter:blur(14px);
border-bottom:1px solid #cde1d4;
z-index:1000;
}

.nav-inner{
max-width:1200px;
margin:auto;
padding:15px 24px;
display:flex;
justify-content:center;
gap:24px;
}

.nav-inner a{
text-decoration:none;
color:var(--accent);
font-size:14px;
font-weight:500;
position:relative;
}

.nav-inner a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0;
height:2px;
background:var(--accent);
transition:.3s;
}

.nav-inner a:hover::after{
width:100%;
}

/* HERO */
.hero{
text-align:center;
padding:85px 24px 35px;
}

.hero h1{
font-size:clamp(42px,6vw,74px);
margin-bottom:14px;
}

.hero p{
max-width:700px;
margin:auto;
font-size:18px;
color:var(--muted);
}

/* TOP MEDIA */
.media-section{
max-width:1100px;
margin:40px auto 10px;
padding:0 24px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:24px;
}

.media-box{
width:260px;
height:160px;
background:#d3ead8;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
color:#4b5a4d;
box-shadow:0 14px 30px rgba(0,0,0,.08);
transition:.35s;
}

.media-box:hover{
transform:translateY(-6px);
}

/* CONTACT GRID */
.contact-wrap{
max-width:1100px;
margin:50px auto 100px;
padding:0 24px;
display:grid;
grid-template-columns:1fr .9fr;
gap:36px;
}

@media(max-width:900px){
.contact-wrap{
grid-template-columns:1fr;
}
}

/* FORM */
.form-card{
background:var(--card);
padding:40px;
border-radius:var(--radius);
box-shadow:0 18px 40px rgba(0,0,0,.08);
}

.form-group{
margin-bottom:22px;
}

.form-group label{
display:block;
font-size:14px;
font-weight:500;
margin-bottom:8px;
}

.form-group input,
.form-group textarea{
width:100%;
padding:14px 16px;
border-radius:14px;
border:1px solid #cfe3d5;
font-size:15px;
}

.form-group textarea{
height:120px;
resize:none;
}

.submit-btn{
padding:16px 36px;
border:none;
border-radius:35px;
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:#fff;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.submit-btn:hover{
transform:translateY(-2px);
}

/* INFO CARD */
.info-card{
background:white;
padding:36px;
border-radius:var(--radius);
box-shadow:0 18px 40px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
gap:24px;
}

.info-card h3{
font-size:28px;
}

.info-item span{
display:block;
font-size:13px;
color:var(--muted);
margin-bottom:4px;
}

.info-item strong{
font-size:16px;
}

.info-video{
height:160px;
background:#f2f6f3;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
color:#4b5a4d;
}

/* FOOTER */
footer{
background:#dff3e0;
text-align:center;
padding:36px 24px;
font-size:14px;
color:#4b5a4d;
}
</style>
</head>
<body>

</div>
</nav>

<div class="form-group">
<label>Full Name</label>
<input type="text" name="name" required>
</div>

<div class="form-group">

<input type="email" name="email" required>
</div>

<div class="form-group">

<input type="tel" name="phone">
</div>

<div class="form-group">
<label>Your Message</label>
<textarea name="message" required></textarea>
</div>

<button class="submit-btn" type="submit">
Submit
</button>

</div>
</form>

<!-- COMPANY INFO -->
<div class="info-card">

<h3>AgroSmart Pvt. Ltd.</h3>

<div class="info-item">
<span>📍 Location</span>
<strong>India</strong>
</div>

<div class="info-item">
<span>📧 Email</span>
<strong>agrosmart.pvt@gmail.com</strong>
</div>

<div class="info-item">
<span>📞 Phone</span>
<strong>+91 93307 33318</strong>
</div>

<div class="info-item">
<span>💬 WhatsApp</span>
<strong>Available 9 AM – 9 PM</strong>
</div>

<div class="info-video">
Video Here
</div>

</div>

</section>

<footer>
© 2026 AgroSmart. All rights reserved.
</footer>

</body>
</html>
