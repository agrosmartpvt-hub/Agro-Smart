<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Thank You | AgroSmart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#f0f8f5;
 --text:#0f2d1c;
 --muted:#4b5a4d;
 --card:#e6f2ea;
 --accent:#2e7d32;
 --radius:22px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* NAV */
nav{
position:sticky;
top:0;
background:rgba(240,248,245,.92);
backdrop-filter:blur(14px);
border-bottom:1px solid #cde1d4;
}

.nav-inner{
max-width:1200px;
margin:auto;
padding:15px 24px;
display:flex;
justify-content:center;
gap:24px;
}

.nav-inner a{
text-decoration:none;
color:var(--accent);
font-size:14px;
font-weight:500;
position:relative;
}

.nav-inner a::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0;
height:2px;
background:var(--accent);
transition:.3s;
}

.nav-inner a:hover::after{
width:100%;
}

/* MAIN */
.wrapper{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:50px 20px;
}

.card{
background:var(--card);
max-width:650px;
width:100%;
padding:60px 50px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
text-align:center;
animation:fadeUp 1s ease;
}

.check{
font-size:72px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

h1{
font-size:46px;
margin-bottom:18px;
}

.subtitle{
font-size:18px;
color:var(--muted);
line-height:1.7;
margin-bottom:35px;
}

.info-boxes{
display:flex;
gap:18px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:35px;
}

.info-box{
background:#d3ead8;
width:220px;
height:120px;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
color:#4b5a4d;
font-weight:500;
}

.home-btn{
display:inline-block;
padding:16px 36px;
border-radius:35px;
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.home-btn:hover{
transform:translateY(-3px);
}

footer{
background:#dff3e0;
text-align:center;
padding:30px 20px;
font-size:14px;
color:#4b5a4d;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}
</style>
</head>
<body>

<nav>
<div class="nav-inner">
<a href="Products.html">Products</a>
<a href="Vision.html">Vision</a>
<a href="#app">App</a>
<a href="#order">Order</a>
<a href="AgroSmart2.html">Home</a>
</div>
</nav>

<div class="wrapper">
<div class="card">

<div class="check">✅</div>

<h1>Thank You!</h1>

<p class="subtitle">
Your message has been submitted successfully.  
The AgroSmart team will get back to you shortly.
</p>

<div class="info-boxes">
<div class="info-box">Inquiry Received </div>
<div class="info-box">Response Within 24 Hours</div>
</div>

<a href="AgroSmart2.html" class="home-btn">
Go Back Home
</a>

</div>
</div>

<footer>
© 2026 AgroSmart. All rights reserved.
</footer>

</body>
</html>
